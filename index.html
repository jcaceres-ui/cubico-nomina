<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1F3864">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Cubico Nomina</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--dark:#1F3864;--mid:#2E75B6;--bg:#f5f7fa;--surface:#fff;--red:#C00000;--lred:#FFCCCC;--lorange:#FCE4D6;--yellow:#FFF2CC;--text:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;--he:#EAF3DE;--he-t:#3B6D11;--noct:#EEEDFE;--noct-t:#534AB7;--dom:#FAECE7;--dom-t:#993C1D}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
.hdr{background:var(--dark);color:#fff;padding:max(env(safe-area-inset-top),12px) 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-title{font-size:17px;font-weight:600}
.hdr-sub{font-size:11px;opacity:.7;margin-top:1px}
.tabs{display:flex;background:var(--dark);border-top:1px solid rgba(255,255,255,.12);flex-shrink:0}
.tab{flex:1;padding:9px 4px;text-align:center;font-size:12px;color:rgba(255,255,255,.55);cursor:pointer;border-bottom:2px solid transparent}
.tab.on{color:#fff;border-bottom-color:#4f8ef7}
.area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px 90px}
.hscroll{display:flex;gap:5px;overflow-x:auto;padding-bottom:6px;margin-bottom:8px;scrollbar-width:none}
.hscroll::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 12px;border-radius:16px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);white-space:nowrap}
.chip.on{background:var(--dark);color:#fff;border-color:var(--dark)}
.chip.day.on{background:var(--mid);border-color:var(--mid)}
.chip.fest{background:var(--yellow);color:#92400e;border-color:#fbbf24}
.day-title{font-size:13px;font-weight:600;color:var(--dark);margin-bottom:8px}
.alert{background:var(--yellow);border:1px solid #fbbf24;border-radius:10px;padding:8px 10px;font-size:12px;color:#92400e;margin-bottom:8px}
.ecard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px;margin-bottom:8px}
.ecard.inc{background:var(--lorange)}
.ecard.casa{background:var(--yellow)}
.etop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:6px}
.ename{font-size:13px;font-weight:600;color:var(--dark);line-height:1.2}
.erole{font-size:10px;color:var(--muted);margin-top:2px}
.nsel{font-size:11px;padding:4px 6px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);max-width:138px;flex-shrink:0}
.tgrid{display:flex;flex-direction:column;gap:5px}
.trow{display:flex;align-items:center;gap:4px;width:100%;padding:0 2px}
.tlbl{font-size:11px;color:var(--muted);width:24px;flex-shrink:0;text-align:center}
.tinp{width:0;flex:1;min-width:0;padding:9px 2px;border:1px solid var(--border);border-radius:8px;font-size:16px;text-align:center;background:var(--bg);color:var(--text);-webkit-appearance:none}
.tinp:focus{outline:none;border-color:var(--mid);background:#fff}
.tsep{font-size:12px;color:var(--muted);flex-shrink:0}
.eres{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.b-ord{background:#e0f2fe;color:#0369a1}
.b-hed{background:var(--he);color:var(--he-t)}
.b-hen{background:var(--noct);color:var(--noct-t)}
.b-dom{background:var(--dom);color:var(--dom-t)}
.b-val{background:var(--dark);color:#fff}
.b-nov{background:var(--yellow);color:#92400e}
.btnrow{position:fixed;bottom:0;left:0;right:0;padding:8px 12px max(env(safe-area-inset-bottom),8px);background:var(--surface);border-top:1px solid var(--border);display:flex;gap:8px;z-index:100}
.btn{flex:1;padding:12px;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.btn-s{background:var(--mid)}
.btn-c{background:var(--dark)}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 8px}
.sc-lbl{font-size:11px;color:var(--muted);margin-bottom:3px}
.sc-val{font-size:20px;font-weight:600;color:var(--dark)}
.sc-sub{font-size:10px;color:var(--muted);margin-top:1px}
.acard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:6px}
.atop{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.aname{font-size:13px;font-weight:600}
.arole{font-size:10px;color:var(--muted)}
.aval{font-size:13px;font-weight:600;color:var(--dark);flex-shrink:0;margin-left:8px}
.abadges{display:flex;flex-wrap:wrap;gap:4px}
.shdr{font-size:13px;font-weight:600;color:var(--dark);margin-bottom:8px}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.on{opacity:1}
@media(max-width:375px){.tinp{font-size:14px;padding:8px 1px}.tlbl{width:20px}.nsel{max-width:120px}.ename{font-size:12px}}
@media(orientation:landscape){.area{padding-bottom:60px}.btnrow{padding:6px 12px}}
</style>
</head>
<body>
<div class="hdr">
  <div><div class="hdr-title">Cubico Nomina</div><div class="hdr-sub">Cubiertas de Colombia</div></div>
  <div style="font-size:11px;opacity:.7;text-align:right" id="hdr-r"></div>
</div>
<div class="tabs">
  <div class="tab on" onclick="switchTab(0)">Registro</div>
  <div class="tab" onclick="switchTab(1)">Acumulado</div>
</div>
<div class="area" id="t0">
  <div class="hscroll" id="ps"></div>
  <div class="hscroll" id="ds"></div>
  <div id="dtitle" class="day-title"></div>
  <div id="dalert"></div>
  <div id="elist"></div>
</div>
<div class="area" id="t1" style="display:none">
  <div class="hscroll" id="pas"></div>
  <div class="sgrid" id="sgrid"></div>
  <div class="shdr">Por empleado</div>
  <div id="alist"></div>
</div>
<div class="btnrow" id="brow">
  <button class="btn btn-s" onclick="saveDay()">Guardar</button>
  <button class="btn btn-c" onclick="sendClaude()">Enviar a Claude</button>
</div>
<div class="toast" id="toast">Guardado</div>
<script>
const EMP=[
  {id:"98478547",  ap:"HERNANDEZ",  nm:"ALBERTO",    c:"Pintor",                  s:1750905,a:1,o:""},
  {id:"1010107624",ap:"VILLA",      nm:"ANDERSON",   c:"Ayudante Cubiertas",      s:1750905,a:1,o:""},
  {id:"1120925887",ap:"SARMIENTO",  nm:"ARNALDO",    c:"Oficial Cubiertas",       s:2000000,a:1,o:""},
  {id:"1214744447",ap:"OCHOA",      nm:"CRISTIAN",   c:"Ingeniero Planta",        s:3502000,a:0,o:""},
  {id:"71793031",  ap:"TOBON",      nm:"EDISSON",    c:"Ayudante Soldador",       s:1750905,a:1,o:""},
  {id:"8363884",   ap:"CORREA",     nm:"EDWIN",      c:"Soldador/Pintor/Montador",s:2200000,a:1,o:""},
  {id:"1015070341",ap:"ARANGO",     nm:"ESTEBAN",    c:"Ayudante",                s:1750905,a:1,o:""},
  {id:"71269852",  ap:"HERNANDEZ",  nm:"FABIAN",     c:"Pintor",                  s:1750905,a:1,o:""},
  {id:"1214732042",ap:"ARROYAVE",   nm:"GUSTAVO",    c:"Soldador/Pintor/Montador",s:2020000,a:1,o:""},
  {id:"15371723",  ap:"DUQUE",      nm:"HECTOR",     c:"SISO",                    s:1750905,a:0,o:"inc"},
  {id:"1039470885",ap:"GARCIA",     nm:"JEFFERSON",  c:"Ayudante",                s:1750905,a:1,o:""},
  {id:"1128454208",ap:"CORTES",     nm:"JOAN DANIEL",c:"Soldador",                s:1750905,a:0,o:"casa"},
  {id:"13068799",  ap:"CACERES",    nm:"JOSE EDUARDO",c:"Gerente",                s:5000000,a:0,o:""},
  {id:"71682368",  ap:"GIRALDO",    nm:"JOSE IVAN",  c:"Soldador en Piso",        s:1750905,a:1,o:""},
  {id:"1152699870",ap:"DAVID",      nm:"JUAN CARLOS",c:"SISO",                    s:2100000,a:1,o:""},
  {id:"71382929",  ap:"GARCIA",     nm:"JUAN PABLO", c:"Oficial Cubiertas",       s:1750905,a:1,o:""},
  {id:"43803458",  ap:"HERNANDEZ",  nm:"NORELIS",    c:"Empleada Domestica",      s:1750905,a:1,o:""},
  {id:"98396958",  ap:"ORTEGA",     nm:"RAMON",      c:"Soldador/Pintor/Montador",s:2200000,a:1,o:""},
  {id:"1124858315",ap:"GUETIO",     nm:"YUDI",       c:"SISO",                    s:2135250,a:1,o:""},
];
const FEST={"2026-01-01":1,"2026-01-12":1,"2026-03-23":1,"2026-04-02":1,"2026-04-03":1,"2026-04-30":1,"2026-05-01":1,"2026-05-18":1,"2026-06-08":1,"2026-06-29":1,"2026-07-20":1,"2026-08-07":1,"2026-08-17":1,"2026-10-12":1,"2026-11-02":1,"2026-11-16":1,"2026-12-08":1,"2026-12-25":1};
const DS=["Dom","Lun","Mar","Mie","Jue","Vie","Sab"];
const MS=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const ML=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DIV=220;
let pk=null,apk=null,cd=null,dat={};

function iso(y,m,d){return y+"-"+String(m).padStart(2,"0")+"-"+String(d).padStart(2,"0")}
function isF(s){return!!FEST[s]}
function isD(s){return new Date(s+"T12:00").getDay()===0}
function isS(s){return new Date(s+"T12:00").getDay()===6}

function allPeriods(){
  let r=[];
  for(let m=1;m<=12;m++) for(let p=1;p<=2;p++) r.push({k:`2026-${m}-${p}`,m,p,lbl:`${MS[m-1]} ${p===1?"1-15":"16-fin"}`});
  return r;
}

function getDays(m,p){
  let r=[],s=p===1?1:16,e=p===1?16:32;
  for(let d=s;d<e;d++){
    let s2=iso(2026,m,d),dt=new Date(s2+"T12:00");
    if(dt.getMonth()!==m-1) break;
    if(isD(s2)) continue;
    r.push({s:s2,d,f:isF(s2)});
  }
  return r;
}

function pH(s){
  if(!s||!s.trim()) return null;
  s=s.replace(":","").trim();
  if(s.length<3||s.length>4) return null;
  let h=parseInt(s.length===4?s.slice(0,2):s[0]),m=parseInt(s.slice(-2));
  if(isNaN(h)||isNaN(m)||h>23||m>59) return null;
  return h+m/60;
}

function calc(t,df,sab){
  let ord=0,hed=0,hen=0,hd=0;
  const B=sab?(4+50/60):(7+50/60);
  const DES_E=7+35/60, ALM_E=13;
  let desDone=false, almDone=false;
  t.forEach(x=>{
    let i=pH(x.i),f=pH(x.f);
    if(i===null||f===null) return;
    if(f<=i) f+=24;
    let d=f-i; if(d<=0) return;
    if(!desDone&&i<DES_E&&f>(7+10/60)){d-=25/60;desDone=true;}
    if(!sab&&!almDone&&i<ALM_E&&f>12){d-=1;almDone=true;}
    if(d<=0) return;
    let n=0;
    if(f>21){let s2=Math.max(i,21),e2=Math.min(f,30);if(e2>s2)n+=e2-s2;}
    if(i<6){let s2=Math.max(i,0),e2=Math.min(f,6);if(e2>s2)n+=e2-s2;}
    let di=d-n;
    if(df){hd+=di;hen+=n;}else{ord+=di;hen+=n;}
  });
  if(!df&&ord>B){hed=ord-B;ord=B;}
  return{ord,hed,hen,hd};
}

function vhe(e,hed,hen,hd){
  let v=e.s/DIV;
  return Math.round(hed*v*1.25+hen*v*1.75+hd*v*2);
}

function gk(s,id){return s+"_"+id}
function ik(s,id){let k=gk(s,id);if(!dat[k])dat[k]={t:[{i:"",f:""},{i:"",f:""},{i:"",f:""}],n:"normal"};return k;}
function save(){try{localStorage.setItem("cub2",JSON.stringify(dat));}catch(e){}}
function load(){try{let d=localStorage.getItem("cub2");if(d)dat=JSON.parse(d);}catch(e){}}

function renderPS(id,active,fn){
  let sc=document.getElementById(id);sc.innerHTML="";
  allPeriods().forEach(({k,lbl})=>{
    let el=document.createElement("div");
    el.className="chip"+(k===active?" on":"");
    el.textContent=lbl;el.onclick=()=>fn(k);sc.appendChild(el);
  });
  setTimeout(()=>{let a=sc.querySelector(".on");if(a)a.scrollIntoView({inline:"center",block:"nearest"});},80);
}

function setPeriod(k){
  pk=k;cd=null;
  let[y,m,p]=k.split("-").map(Number);
  document.getElementById("hdr-r").textContent=MS[m-1]+" "+(p===1?"1-15":"16-fin");
  renderPS("ps",k,setPeriod);
  renderDS(m,p);
  document.getElementById("dtitle").textContent="Selecciona un dia";
  document.getElementById("dalert").innerHTML="";
  document.getElementById("elist").innerHTML="";
}

function renderDS(m,p){
  let days=getDays(m,p),sc=document.getElementById("ds");sc.innerHTML="";
  days.forEach(day=>{
    let dt=new Date(day.s+"T12:00"),lbl=DS[dt.getDay()]+" "+day.d+(day.f?" F":"");
    let el=document.createElement("div");
    el.className="chip day"+(day.f?" fest":"")+(cd===day.s?" on":"");
    el.textContent=lbl;el.onclick=()=>selDay(day.s,day.f);sc.appendChild(el);
  });
}

function selDay(s,isFestivo){
  cd=s;
  let[y,m,p]=pk.split("-").map(Number);
  renderDS(m,p);
  let dt=new Date(s+"T12:00"),df=isFestivo||isD(s);
  document.getElementById("dtitle").textContent=DS[dt.getDay()]+" "+dt.getDate()+" "+MS[dt.getMonth()]+" 2026"+(isFestivo?" - FESTIVO":"");
  document.getElementById("dalert").innerHTML=df?'<div class="alert">Festivo/dominical - aplica recargo o HE dominical</div>':''  ;
  renderEL(s,df,isSabado);
}

function renderEL(s,df,sb){
  let list=document.getElementById("elist");list.innerHTML="";
  EMP.forEach(e=>{
    let k=ik(s,e.id),d=dat[k];
    let cls="ecard"+(e.o==="inc"?" inc":e.o==="casa"?" casa":"");
    let card=document.createElement("div");card.className=cls;
    card.innerHTML='<div class="etop"><div style="flex:1;min-width:0"><div class="ename">'+e.ap+" "+e.nm+'</div><div class="erole">'+e.c+'</div></div><select class="nsel" onchange="uN(\'\'+s+'\',\'\'+e.id+'\',this.value)"><option value="normal"'+( d.n==="normal"?" selected":"")+'>Normal</option><option value="P"'+( d.n==="P"?" selected":"")+'>P-Permiso</option><option value="NP"'+( d.n==="NP"?" selected":"")+'>NP-Sin permiso</option><option value="INC"'+( d.n==="INC"?" selected":"")+'>INC-Incapacidad</option><option value="VAC"'+( d.n==="VAC"?" selected":"")+'>VAC-Vacaciones</option><option value="CAL"'+( d.n==="CAL"?" selected":"")+'>CAL-Calamidad</option></select></div><div class="tgrid">'
      +[0,1,2].map(i=>'<div class="trow"><span class="tlbl">T'+(i+1)+'</span><input class="tinp" type="tel" inputmode="numeric" placeholder="0710" maxlength="4" value="'+d.t[i].i+'" oninput="uT(\'\'+s+'\',\'\'+e.id+'\','+i+',\'i\',this.value)"><span class="tsep">-</span><input class="tinp" type="tel" inputmode="numeric" placeholder="1625" maxlength="4" value="'+d.t[i].f+'" oninput="uT(\'\'+s+'\',\'\'+e.id+'\','+i+',\'f\',this.value)"></div>').join("")
      +'</div><div class="eres" id="r_'+e.id+'"></div>';
    list.appendChild(card);
    updR(s,e,df,sb);
  });
}

function uN(s,id,v){let k=ik(s,id);dat[k].n=v;}
function uT(s,id,i,f,v){
  let k=ik(s,id);dat[k].t[i][f]=v;
  let e=EMP.find(x=>x.id===id),df=isF(s)||isD(s);
  updR(s,e,df,sb);
}

function updR(s,e,df,sb){
  let k=gk(s,e.id),d=dat[k];if(!d)return;
  let el=document.getElementById("r_"+e.id);if(!el)return;
  let has=d.t.some(t=>t.i&&t.f);if(!has){el.innerHTML="";return;}
  let r=calc(d.t,df,sb),v=vhe(e,r.hed,r.hen,r.hd);
  el.innerHTML=(r.ord>0?'<span class="badge b-ord">Ord '+r.ord.toFixed(1)+'h</span>':""  )
    +(r.hed>0?'<span class="badge b-hed">HE '+r.hed.toFixed(2)+'h</span>':""  )
    +(r.hen>0?'<span class="badge b-hen">Noct '+r.hen.toFixed(2)+'h</span>':""  )
    +(r.hd>0?'<span class="badge b-dom">Dom '+r.hd.toFixed(2)+'h</span>':""  )
    +(v>0?'<span class="badge b-val">$'+v.toLocaleString("es-CO")+'</span>':""  );
}

function saveDay(){
  save();
  let t=document.getElementById("toast");t.className="toast on";
  setTimeout(()=>t.className="toast",2000);
}

function setAcum(k){
  apk=k;renderPS("pas",k,setAcum);renderAcum();
}

function renderAcum(){
  if(!apk)return;
  let[y,m,p]=apk.split("-").map(Number),days=getDays(m,p);
  let tO=0,tH=0,tN=0,tD=0,tV=0;
  let rows=EMP.map(e=>{
    let ord=0,hed=0,hen=0,hd=0,ns=[];
    days.forEach(day=>{
      let k=gk(day.s,e.id),d=dat[k];if(!d)return;
      let r=calc(d.t,isF(day.s)||isD(day.s),isS(day.s));
      ord+=r.ord;hed+=r.hed;hen+=r.hen;hd+=r.hd;
      if(d.n&&d.n!=="normal")ns.push(d.n);
    });
    let v=vhe(e,hed,hen,hd);
    tO+=ord;tH+=hed;tN+=hen;tD+=hd;tV+=v;
    return{e,ord,hed,hen,hd,v,ns};
  });
  document.getElementById("sgrid").innerHTML=
    '<div class="sc"><div class="sc-lbl">Hrs ordinarias</div><div class="sc-val">'+tO.toFixed(1)+'</div></div>'
    +'<div class="sc"><div class="sc-lbl">HE diurnas</div><div class="sc-val">'+tH.toFixed(1)+'</div></div>'
    +'<div class="sc"><div class="sc-lbl">HE nocturnas</div><div class="sc-val">'+tN.toFixed(1)+'</div></div>'
    +'<div class="sc"><div class="sc-lbl">Valor HE</div><div class="sc-val" style="font-size:15px">$'+tV.toLocaleString("es-CO")+'</div></div>';
  let list=document.getElementById("alist");list.innerHTML="";
  rows.forEach(({e,ord,hed,hen,hd,v,ns})=>{
    let div=document.createElement("div");div.className="acard";
    let nb=e.o==="inc"?'<span class="badge b-hen">INC</span>':e.o==="casa"?'<span class="badge b-nov">En casa</span>':ns.length?[...new Set(ns)].map(n=>'<span class="badge b-nov">'+n+'</span>').join(""):"";
    div.innerHTML='<div class="atop"><div style="flex:1;min-width:0"><div class="aname">'+e.ap+" "+e.nm+'</div><div class="arole">'+e.c+'</div></div><div class="aval">'+( v>0?"$"+v.toLocaleString("es-CO"):"—")+'</div></div><div class="abadges">'
      +(ord>0?'<span class="badge b-ord">Ord '+ord.toFixed(1)+'h</span>':""  )
      +(hed>0?'<span class="badge b-hed">HE '+hed.toFixed(2)+'h</span>':""  )
      +(hen>0?'<span class="badge b-hen">Noct '+hen.toFixed(2)+'h</span>':""  )
      +(hd>0?'<span class="badge b-dom">Dom '+hd.toFixed(2)+'h</span>':""  )
      +nb+'</div>';
    list.appendChild(div);
  });
}

function switchTab(i){
  document.getElementById("t0").style.display=i===0?"block":"none";
  document.getElementById("t1").style.display=i===1?"block":"none";
  document.getElementById("brow").style.display=i===0?"flex":"none";
  document.querySelectorAll(".tab").forEach((el,j)=>el.className="tab"+(j===i?" on":""));
  if(i===1){if(!apk)apk=pk;renderPS("pas",apk,setAcum);renderAcum();}
}

function sendClaude(){
  save();
  if(!pk){alert("Selecciona una quincena");return;}
  let[y,m,p]=pk.split("-").map(Number),days=getDays(m,p);
  let lines=[`Reporte nomina ${ML[m-1]} ${p===1?"1-15":"16-fin"} 2026:\n`];
  days.forEach(day=>{
    let dt=new Date(day.s+"T12:00"),dl=[];
    EMP.forEach(e=>{
      let k=gk(day.s,e.id),d=dat[k];if(!d)return;
      let has=d.t.some(t=>t.i&&t.f),hn=d.n&&d.n!=="normal";
      if(!has&&!hn&&!e.o)return;
      let r=calc(d.t,isF(day.s)||isD(day.s),isS(day.s));
      let ts=d.t.filter(t=>t.i&&t.f).map(t=>t.i+"-"+t.f).join(" / ");
      let line="  "+e.ap+" "+e.nm+": "+(ts||"—");
      if(r.hed>0)line+=" | HE "+r.hed.toFixed(2)+"h";
      if(r.hen>0)line+=" | Noct "+r.hen.toFixed(2)+"h";
      if(r.hd>0)line+=" | Dom "+r.hd.toFixed(2)+"h";
      if(hn)line+=" ["+d.n+"]";
      if(e.o)line+=" ["+e.o+"]";
      dl.push(line);
    });
    if(dl.length){lines.push(DS[new Date(day.s+"T12:00").getDay()]+" "+dt.getDate()+" "+MS[dt.getMonth()]+":");lines.push(...dl,"");}
  });
  window.open("https://claude.ai/new?q="+encodeURIComponent(lines.join("\n")),"_blank");
}
