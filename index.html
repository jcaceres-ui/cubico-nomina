<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f7fa;color:#1a1a2e;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.hdr{background:#1F3864;color:#fff;padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding-top:max(env(safe-area-inset-top,0px),12px)}
.hdr h1{font-size:17px;font-weight:600}
.hdr p{font-size:11px;opacity:.7;margin-top:1px}
.hdr-r{font-size:11px;opacity:.8;text-align:right}

.tab.on{color:#fff;border-bottom-color:#4f8ef7}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 100px}
.hs{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;margin-bottom:10px;scrollbar-width:none}
.hs::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid #e5e7eb;background:#fff;color:#6b7280;cursor:pointer;white-space:nowrap}
.chip.on{background:#1F3864;color:#fff;border-color:#1F3864}
.chip.day.on{background:#2E75B6;border-color:#2E75B6}
.chip.fest{background:#FFF2CC;color:#92400e;border-color:#fbbf24}
.dtitle{font-size:14px;font-weight:600;color:#1F3864;margin-bottom:8px;min-height:20px}
.alert{background:#FFF2CC;border:1px solid #fbbf24;border-radius:10px;padding:8px 12px;font-size:12px;color:#92400e;margin-bottom:8px}
.ecard{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin-bottom:10px}
.ecard.inc{background:#FCE4D6}
.ecard.casa{background:#FFF2CC}
.etop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px}
.ename{font-size:14px;font-weight:600;color:#1F3864}
.erole{font-size:11px;color:#6b7280;margin-top:2px}
select{font-size:12px;padding:5px 8px;border:1px solid #e5e7eb;border-radius:8px;background:#f5f7fa;color:#1a1a2e;max-width:150px}
.tgrid{display:flex;flex-direction:column;gap:6px}
.trow{display:flex;align-items:center;gap:6px}
.tlbl{font-size:11px;color:#6b7280;width:24px;text-align:center;flex-shrink:0}
.tin{flex:1;min-width:0;padding:10px 4px;border:1px solid #e5e7eb;border-radius:8px;font-size:16px;text-align:center;background:#f5f7fa;color:#1a1a2e;-webkit-appearance:none}
.tin:focus{outline:none;border-color:#2E75B6;background:#fff}
.tsep{font-size:13px;color:#9ca3af;flex-shrink:0}
.eres{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0;min-height:10px}
.b{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
.bo{background:#e0f2fe;color:#0369a1}
.bh{background:#EAF3DE;color:#3B6D11}
.bn{background:#EEEDFE;color:#534AB7}
.bd{background:#FAECE7;color:#993C1D}
.bv{background:#1F3864;color:#fff}
.bnov{background:#FFF2CC;color:#92400e}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.sc{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px}
.sc-l{font-size:11px;color:#6b7280;margin-bottom:4px}
.sc-v{font-size:22px;font-weight:600;color:#1F3864}
.sc-s{font-size:10px;color:#9ca3af;margin-top:2px}
.acard{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px;margin-bottom:8px}
.atop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.an{font-size:13px;font-weight:600;color:#1F3864}
.ar{font-size:11px;color:#6b7280}
.av{font-size:14px;font-weight:600;color:#1F3864;flex-shrink:0}
.abs{display:flex;flex-wrap:wrap;gap:4px}
.shdr{font-size:13px;font-weight:600;color:#1F3864;margin-bottom:10px}
.btns{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e7eb;padding:10px 12px;padding-bottom:max(env(safe-area-inset-bottom,0px),10px);display:flex;gap:8px;z-index:100}
.btn{flex:1;padding:13px;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.bs{background:#2E75B6}
.bc{background:#1F3864}
.toast{position:fixed;top:75px;left:50%;transform:translateX(-50%);background:#1F3864;color:#fff;padding:8px 22px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
</style>
</head>

<script>
var EMP=[
  {id:"98478547",  ap:"HERNANDEZ", nm:"ALBERTO",    c:"Pintor",                   s:1750905,a:1,o:""},
  {id:"1010107624",ap:"VILLA",     nm:"ANDERSON",   c:"Ayudante Cubiertas",       s:1750905,a:1,o:""},
  {id:"1120925887",ap:"SARMIENTO", nm:"ARNALDO",    c:"Oficial Cubiertas",        s:2000000,a:1,o:""},
  {id:"1214744447",ap:"OCHOA",     nm:"CRISTIAN",   c:"Ingeniero Planta",         s:3502000,a:0,o:""},
  {id:"71793031",  ap:"TOBON",     nm:"EDISSON",    c:"Ayudante Soldador",        s:1750905,a:1,o:""},
  {id:"8363884",   ap:"CORREA",    nm:"EDWIN",      c:"Soldador/Pintor/Montador", s:2200000,a:1,o:""},
  {id:"1015070341",ap:"ARANGO",    nm:"ESTEBAN",    c:"Ayudante",                 s:1750905,a:1,o:""},
  {id:"71269852",  ap:"HERNANDEZ", nm:"FABIAN",     c:"Pintor",                   s:1750905,a:1,o:""},
  {id:"1214732042",ap:"ARROYAVE",  nm:"GUSTAVO",    c:"Soldador/Pintor/Montador", s:2020000,a:1,o:""},
  {id:"15371723",  ap:"DUQUE",     nm:"HECTOR",     c:"SISO",                     s:1750905,a:0,o:"inc"},
  {id:"1039470885",ap:"GARCIA",    nm:"JEFFERSON",  c:"Ayudante",                 s:1750905,a:1,o:""},
  {id:"1128454208",ap:"CORTES",    nm:"JOAN DANIEL",c:"Soldador",                 s:1750905,a:0,o:"casa"},
  {id:"13068799",  ap:"CACERES",   nm:"JOSE EDUARDO",c:"Gerente",                 s:5000000,a:0,o:""},
  {id:"71682368",  ap:"GIRALDO",   nm:"JOSE IVAN",  c:"Soldador en Piso",         s:1750905,a:1,o:""},
  {id:"1152699870",ap:"DAVID",     nm:"JUAN CARLOS",c:"SISO",                     s:2100000,a:1,o:""},
  {id:"71382929",  ap:"GARCIA",    nm:"JUAN PABLO", c:"Oficial Cubiertas",        s:1750905,a:1,o:""},
  {id:"43803458",  ap:"HERNANDEZ", nm:"NORELIS",    c:"Empleada Domestica",       s:1750905,a:1,o:""},
  {id:"98396958",  ap:"ORTEGA",    nm:"RAMON",      c:"Soldador/Pintor/Montador", s:2200000,a:1,o:""},
  {id:"1124858315",ap:"GUETIO",    nm:"YUDI",       c:"SISO",                     s:2135250,a:1,o:""}
];

var FEST={
  "2026-01-01":1,"2026-01-12":1,"2026-03-23":1,"2026-04-02":1,"2026-04-03":1,
  "2026-04-30":1,"2026-05-01":1,"2026-05-18":1,"2026-06-08":1,"2026-06-29":1,
  "2026-07-20":1,"2026-08-07":1,"2026-08-17":1,"2026-10-12":1,"2026-11-02":1,
  "2026-11-16":1,"2026-12-08":1,"2026-12-25":1
};

var DS=["Dom","Lun","Mar","Mie","Jue","Vie","Sab"];
var MS=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
var ML=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
var DIV=220;
var pk=null, apk=null, cd=null, dat={};

function iso(y,m,d){
  return y+"-"+(m<10?"0":"")+m+"-"+(d<10?"0":"")+d;
}
function isFest(s){return !!FEST[s];}
function isDom(s){return new Date(s+"T12:00").getDay()===0;}
function isSab(s){return new Date(s+"T12:00").getDay()===6;}

function allPeriods(){
  var r=[];
  for(var m=1;m<=12;m++){
    for(var p=1;p<=2;p++){
      r.push({k:"2026-"+m+"-"+p, m:m, p:p, lbl:MS[m-1]+" "+(p===1?"1-15":"16-fin")});
    }
  }
  return r;
}

function getDays(m,p){
  var r=[], s=p===1?1:16, e=p===1?16:32;
  for(var d=s;d<e;d++){
    var s2=iso(2026,m,d);
    var dt=new Date(s2+"T12:00");
    if(dt.getMonth()!==m-1) break;
    if(isDom(s2)) continue;
    r.push({s:s2, d:d, f:isFest(s2), sb:isSab(s2)});
  }
  return r;
}

function pH(s){
  if(!s) return null;
  s=s.replace(":","").trim();
  if(s.length<3||s.length>4) return null;
  var h=parseInt(s.length===4?s.substring(0,2):s.substring(0,1));
  var mn=parseInt(s.substring(s.length-2));
  if(isNaN(h)||isNaN(mn)||h>23||mn>59) return null;
  return h+mn/60;
}

function calc(t, df, sb){
  var ord=0,hed=0,hen=0,hd=0;
  var B=sb?(4+50/60):(7+50/60);
  var desDone=false, almDone=false;
  for(var x=0;x<t.length;x++){
    var i=pH(t[x].i), f=pH(t[x].f);
    if(i===null||f===null) continue;
    if(f<=i) f+=24;
    var d=f-i;
    if(d<=0) continue;
    if(!desDone && i<(7+35/60) && f>(7+10/60)){d-=25/60; desDone=true;}
    if(!sb && !almDone && i<13 && f>12){d-=1; almDone=true;}
    if(d<=0) continue;
    var n=0;
    if(f>21){var s1=Math.max(i,21),e1=Math.min(f,30);if(e1>s1)n+=e1-s1;}
    if(i<6){var s2=Math.max(i,0),e2=Math.min(f,6);if(e2>s2)n+=e2-s2;}
    var di=d-n;
    if(df){hd+=di;hen+=n;}
    else{ord+=di;hen+=n;}
  }
  if(!df && ord>B){hed=ord-B; ord=B;}
  return {ord:ord,hed:hed,hen:hen,hd:hd};
}

function vhe(e,r){
  var v=e.s/DIV;
  return Math.round(r.hed*v*1.25+r.hen*v*1.75+r.hd*v*2);
}

function gk(s,id){return s+"_"+id;}
function ik(s,id){
  var k=gk(s,id);
  if(!dat[k]) dat[k]={t:[{i:"",f:""},{i:"",f:""},{i:"",f:""}],n:"normal"};
  return k;
}

function saveSt(){
  try{localStorage.setItem("cub3",JSON.stringify(dat));}catch(e){}
}
function loadSt(){
  try{var d=localStorage.getItem("cub3");if(d)dat=JSON.parse(d);}catch(e){}
}

function renderPS(elId, active, fn){
  var sc=document.getElementById(elId);
  sc.innerHTML="";
  var periods=allPeriods();
  for(var i=0;i<periods.length;i++){
    var p=periods[i];
    var el=document.createElement("div");
    el.className="chip"+(p.k===active?" on":"");
    el.textContent=p.lbl;
    (function(key){el.onclick=function(){fn(key);};})(p.k);
    sc.appendChild(el);
  }
  setTimeout(function(){
    var a=sc.querySelector(".on");
    if(a) a.scrollIntoView({inline:"center",block:"nearest"});
  },100);
}

function setPeriod(k){
  pk=k; cd=null;
  var parts=k.split("-");
  var m=parseInt(parts[1]), p=parseInt(parts[2]);
  document.getElementById("HR").textContent=MS[m-1]+" "+(p===1?"1-15":"16-fin");
  renderPS("PS",k,setPeriod);
  renderDS(m,p);
  document.getElementById("DT").textContent="Selecciona un dia";
  document.getElementById("DA").innerHTML="";
  document.getElementById("EL").innerHTML="";
}

function renderDS(m,p){
  var days=getDays(m,p);
  var sc=document.getElementById("DS");
  sc.innerHTML="";
  for(var i=0;i<days.length;i++){
    var day=days[i];
    var dt=new Date(day.s+"T12:00");
    var lbl=DS[dt.getDay()]+" "+day.d+(day.f?" F":"");
    var el=document.createElement("div");
    el.className="chip day"+(day.f?" fest":"")+(cd===day.s?" on":"");
    el.textContent=lbl;
    (function(s,f,sb){el.onclick=function(){selDay(s,f,sb);};})(day.s,day.f,day.sb);
    sc.appendChild(el);
  }
}

function selDay(s,fest,sb){
  cd=s;
  var parts=pk.split("-");
  renderDS(parseInt(parts[1]),parseInt(parts[2]));
  var dt=new Date(s+"T12:00");
  var df=fest||isDom(s);
  var lbl=DS[dt.getDay()]+" "+dt.getDate()+" "+MS[dt.getMonth()]+" 2026"+(fest?" - FESTIVO":"");
  document.getElementById("DT").textContent=lbl;
  document.getElementById("DA").innerHTML=df?'<div class="alert">Festivo/dominical - aplica recargo o HE dominical</div>':"";
  renderEL(s,df,sb);
}

function renderEL(s,df,sb){
  var list=document.getElementById("EL");
  list.innerHTML="";
  for(var i=0;i<EMP.length;i++){
    var e=EMP[i];
    var k=ik(s,e.id);
    var d=dat[k];
    var cls="ecard"+(e.o==="inc"?" inc":e.o==="casa"?" casa":"");
    var card=document.createElement("div");
    card.className=cls;
    var novOpts='<option value="normal"'+(d.n==="normal"?" selected":"")+'>Normal</option>'
      +'<option value="P"'+(d.n==="P"?" selected":"")+'>P - Permiso</option>'
      +'<option value="NP"'+(d.n==="NP"?" selected":"")+'>NP - Sin permiso</option>'
      +'<option value="INC"'+(d.n==="INC"?" selected":"")+'>INC - Incapacidad</option>'
      +'<option value="VAC"'+(d.n==="VAC"?" selected":"")+'>VAC - Vacaciones</option>'
      +'<option value="CAL"'+(d.n==="CAL"?" selected":"")+'>CAL - Calamidad</option>';
    var turnos='';
    for(var j=0;j<3;j++){
      turnos+='<div class="trow">'
        +'<span class="tlbl">T'+(j+1)+'</span>'
        +'<input class="tin" type="tel" inputmode="numeric" placeholder="0710" maxlength="4" value="'+d.t[j].i+'" id="i_'+e.id+'_'+j+'">'
        +'<span class="tsep">-</span>'
        +'<input class="tin" type="tel" inputmode="numeric" placeholder="1625" maxlength="4" value="'+d.t[j].f+'" id="f_'+e.id+'_'+j+'">'
        +'</div>';
    }
    card.innerHTML='<div class="etop"><div style="flex:1;min-width:0">'
      +'<div class="ename">'+e.ap+' '+e.nm+'</div>'
      +'<div class="erole">'+e.c+'</div></div>'
      +'<select id="n_'+e.id+'">'+novOpts+'</select></div>'
      +'<div class="tgrid">'+turnos+'</div>'
      +'<div class="eres" id="r_'+e.id+'"></div>';
    list.appendChild(card);
    // Attach events after appending
    (function(emp,iso2,isdf,issb){
      var sel=document.getElementById("n_"+emp.id);
      sel.onchange=function(){var k2=ik(iso2,emp.id);dat[k2].n=this.value;};
      for(var j2=0;j2<3;j2++){
        (function(ji){
          var ei=document.getElementById("i_"+emp.id+"_"+ji);
          var ef=document.getElementById("f_"+emp.id+"_"+ji);
          ei.oninput=function(){var k2=ik(iso2,emp.id);dat[k2].t[ji].i=this.value;updR(iso2,emp,isdf,issb);};
          ef.oninput=function(){var k2=ik(iso2,emp.id);dat[k2].t[ji].f=this.value;updR(iso2,emp,isdf,issb);};
        })(j2);
      }
    })(e,s,df,sb);
    updR(s,e,df,sb);
  }
}

function updR(s,e,df,sb){
  var k=gk(s,e.id), d=dat[k];
  if(!d) return;
  var el=document.getElementById("r_"+e.id);
  if(!el) return;
  var has=false;
  for(var i=0;i<d.t.length;i++){if(d.t[i].i&&d.t[i].f){has=true;break;}}
  if(!has){el.innerHTML="";return;}
  var r=calc(d.t,df,sb), v=vhe(e,r);
  var html="";
  if(r.ord>0) html+='<span class="b bo">Ord '+r.ord.toFixed(1)+'h</span>';
  if(r.hed>0) html+='<span class="b bh">HE '+r.hed.toFixed(2)+'h</span>';
  if(r.hen>0) html+='<span class="b bn">Noct '+r.hen.toFixed(2)+'h</span>';
  if(r.hd>0)  html+='<span class="b bd">Dom '+r.hd.toFixed(2)+'h</span>';
  if(v>0)     html+='<span class="b bv">$'+v.toLocaleString("es-CO")+'</span>';
  el.innerHTML=html;
}

function SD(){
  saveSt();
  var t=document.getElementById("TT");
  t.className="toast on";
  setTimeout(function(){t.className="toast";},2000);
}

function setAcum(k){
  apk=k;
  renderPS("PAS",k,setAcum);
  renderAcum();
}

function renderAcum(){
  if(!apk) return;
  var parts=apk.split("-");
  var m=parseInt(parts[1]),p=parseInt(parts[2]);
  var days=getDays(m,p);
  var tO=0,tH=0,tN=0,tD=0,tV=0;
  var rows=[];
  for(var ei=0;ei<EMP.length;ei++){
    var e=EMP[ei];
    var ord=0,hed=0,hen=0,hd=0,ns=[];
    for(var di=0;di<days.length;di++){
      var day=days[di];
      var k=gk(day.s,e.id), d=dat[k];
      if(!d) continue;
      var r=calc(d.t,isFest(day.s)||isDom(day.s),day.sb);
      ord+=r.ord;hed+=r.hed;hen+=r.hen;hd+=r.hd;
      if(d.n&&d.n!=="normal") ns.push(d.n);
    }
    var v=vhe(e,{hed:hed,hen:hen,hd:hd});
    tO+=ord;tH+=hed;tN+=hen;tD+=hd;tV+=v;
    rows.push({e:e,ord:ord,hed:hed,hen:hen,hd:hd,v:v,ns:ns});
  }
  document.getElementById("SG").innerHTML=
    '<div class="sc"><div class="sc-l">Hrs ordinarias</div><div class="sc-v">'+tO.toFixed(1)+'</div></div>'
    +'<div class="sc"><div class="sc-l">HE diurnas</div><div class="sc-v">'+tH.toFixed(1)+'</div></div>'
    +'<div class="sc"><div class="sc-l">HE nocturnas</div><div class="sc-v">'+tN.toFixed(1)+'</div></div>'
    +'<div class="sc"><div class="sc-l">Valor HE</div><div class="sc-v" style="font-size:15px">$'+tV.toLocaleString("es-CO")+'</div></div>';
  var list=document.getElementById("AL");
  list.innerHTML="";
  for(var ri=0;ri<rows.length;ri++){
    var row=rows[ri];
    var div=document.createElement("div");
    div.className="acard";
    var nb=row.e.o==="inc"?'<span class="b bn">INC</span>':
           row.e.o==="casa"?'<span class="b bnov">En casa</span>':"";
    var bgs="";
    if(row.ord>0) bgs+='<span class="b bo">Ord '+row.ord.toFixed(1)+'h</span>';
    if(row.hed>0) bgs+='<span class="b bh">HE '+row.hed.toFixed(2)+'h</span>';
    if(row.hen>0) bgs+='<span class="b bn">Noct '+row.hen.toFixed(2)+'h</span>';
    if(row.hd>0)  bgs+='<span class="b bd">Dom '+row.hd.toFixed(2)+'h</span>';
    bgs+=nb;
    div.innerHTML='<div class="atop"><div style="flex:1;min-width:0">'
      +'<div class="an">'+row.e.ap+' '+row.e.nm+'</div>'
      +'<div class="ar">'+row.e.c+'</div></div>'
      +'<div class="av">'+(row.v>0?"$"+row.v.toLocaleString("es-CO"):"—")+'</div></div>'
      +'<div class="abs">'+bgs+'</div>';
    list.appendChild(div);
  }
}

function ST(i){
  document.getElementById("M0").style.display=i===0?"block":"none";
  document.getElementById("M1").style.display=i===1?"block":"none";
  document.getElementById("BR").style.display=i===0?"flex":"none";
  document.getElementById("t0").className="tab"+(i===0?" on":"");
  document.getElementById("t1").className="tab"+(i===1?" on":"");
  if(i===1){
    if(!apk) apk=pk;
    renderPS("PAS",apk,setAcum);
    renderAcum();
  }
}

function SC(){
  saveSt();
  if(!pk){alert("Selecciona una quincena");return;}
  var parts=pk.split("-");
  var m=parseInt(parts[1]),p=parseInt(parts[2]);
  var days=getDays(m,p);
  var lines=["Reporte nomina "+ML[m-1]+" "+(p===1?"1-15":"16-fin")+" 2026:\n"];
  for(var di=0;di<days.length;di++){
    var day=days[di];
    var dt=new Date(day.s+"T12:00");
    var dl=[];
    for(var ei=0;ei<EMP.length;ei++){
      var e=EMP[ei];
      var k=gk(day.s,e.id), d=dat[k];
      if(!d) continue;
      var has=false;
      for(var ti=0;ti<d.t.length;ti++){if(d.t[ti].i&&d.t[ti].f){has=true;break;}}
      var hn=d.n&&d.n!=="normal";
      if(!has&&!hn&&!e.o) continue;
      var r=calc(d.t,isFest(day.s)||isDom(day.s),day.sb);
      var ts=[];
      for(var ti2=0;ti2<d.t.length;ti2++){if(d.t[ti2].i&&d.t[ti2].f)ts.push(d.t[ti2].i+"-"+d.t[ti2].f);}
      var line="  "+e.ap+" "+e.nm+": "+(ts.length?ts.join(" / "):"—");
      if(r.hed>0) line+=" | HE "+r.hed.toFixed(2)+"h";
      if(r.hen>0) line+=" | Noct "+r.hen.toFixed(2)+"h";
      if(r.hd>0)  line+=" | Dom "+r.hd.toFixed(2)+"h";
      if(hn) line+=" ["+d.n+"]";
      if(e.o) line+=" ["+e.o+"]";
      dl.push(line);
    }
    if(dl.length){
      lines.push(DS[dt.getDay()]+" "+dt.getDate()+" "+MS[dt.getMonth()]+":");
      for(var li=0;li<dl.length;li++) lines.push(dl[li]);
      lines.push("");
    }
  }
  window.open("https://claude.ai/new?q="+encodeURIComponent(lines.join("\n")),"_blank");
}
